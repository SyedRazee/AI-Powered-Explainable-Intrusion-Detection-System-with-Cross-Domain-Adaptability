{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-cogs"></i> Model Selection</h5>
            </div>
            <div class="card-body">
                <form id="predictionForm">
                    <div class="mb-3">
                        <label class="form-label">Select Model:</label>
                        <select class="form-select" id="modelSelect" name="model_name" required>
                            <option value="">Choose a model...</option>
                            {% for model in models %}
                            <option value="{{ model }}">{{ model.upper() }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- <div class="form-check form-switch my-3">
        <input class="form-check-input" type="checkbox" id="adversarial" name="adversarial">
        <label class="form-check-label" for="simulate_attack">Simulate Adversarial Attack (FGSM via surrogate)</label>
      </div> -->

                    

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-search"></i> Detect Attack
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-keyboard"></i> Feature Input</h5>
                <span id="featureCount" class="badge bg-primary">0 features</span>
            </div>
            <div class="card-body" style="padding: 0;">
                <div style="max-height: 600px; overflow-y: auto; padding: 1rem;">
                    <div id="featureInputs" class="row">
                        <div class="col-12 text-center py-5">
                            <i class="fas fa-cogs fa-3x text-muted mb-3"></i>
                            <p class="text-muted">Select a model to display feature inputs</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card mt-4" id="resultsCard" style="display: none;">
    <div class="card-header">
        <h5 class="mb-0">Analysis Results</h5>
    </div>
    <div class="card-body">
        <div id="resultArea">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Analyzing traffic patterns...</p>
            </div>
        </div>
    </div>
</div>
    </div>
</div>

<!-- Loading Modal -->
<div class="modal fade" id="loadingModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-body text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Analyzing traffic...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
